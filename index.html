<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-container">
    <div id="login-container" class="login-card">
      <div class="login-header">
        <h1>Login</h1>
        <p>Enter your credentials to continue.</p>
      </div>

      <div id="message" style="margin-bottom: 16px; color: red;"></div>

      <form id="login-form" class="form-group">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input id="username" name="username" class="form-input" type="text" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" name="password" class="form-input" type="password" required />
        </div>

        <button class="login-btn" type="submit">Login</button>
      </form>
    </div>

    <div id="dashboard-container" class="dashboard-view login-card" style="display: none;">
      <div class="dashboard-header">
        <div class="dashboard-title-area">
          <div class="dashboard-badge">✓</div>
          <div class="title-text">
            <h2>Dashboard</h2>
            <p id="dashboard-welcome">Welcome!</p>
          </div>
        </div>
      </div>

      <button class="logout-btn" id="logout-button" type="button">Logout</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const loginContainer = document.getElementById("login-container");
      const dashboardContainer = document.getElementById("dashboard-container");
      const loginForm = document.getElementById("login-form");
      const messageEl = document.getElementById("message");
      const dashboardWelcome = document.getElementById("dashboard-welcome");
      const logoutButton = document.getElementById("logout-button");

      console.log("DOM loaded", {
        loginContainer: !!loginContainer,
        dashboardContainer: !!dashboardContainer,
        loginForm: !!loginForm,
        messageEl: !!messageEl,
        dashboardWelcome: !!dashboardWelcome,
        logoutButton: !!logoutButton
      });

      if (!loginContainer || !dashboardContainer || !loginForm || !messageEl || !dashboardWelcome || !logoutButton) {
        console.error("Missing required UI element(s)");
        return;
      }

      function setMessage(text, isError = true) {
        messageEl.textContent = text;
        messageEl.style.color = isError ? "red" : "green";
      }

      loginForm.addEventListener("submit", async function(event) {
        event.preventDefault();
        setMessage("");

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        console.log("Submitting login", { username });

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();
          console.log("Login response", { status: response.status, data });

          if (!response.ok) {
            setMessage(data.error || "Login failed.");
            return;
          }

          if (data.token) {
            localStorage.setItem("authToken", data.token);
          }
          localStorage.setItem("username", username);
          showDashboard(username);
        } catch (error) {
          console.error("Login fetch failed", error);
          setMessage("Login request failed.");
        }
      });

      logoutButton.addEventListener("click", function() {
        localStorage.removeItem("authToken");
        localStorage.removeItem("username");
        showLogin();
      });

      function showDashboard(username) {
        console.log("showDashboard called", { username });
        loginContainer.style.display = "none";
        dashboardContainer.style.display = "flex";
        dashboardContainer.style.flexDirection = "column";
        dashboardWelcome.textContent = `Welcome, ${username}!`;
        console.log("Dashboard visible?", {
          inlineDisplay: dashboardContainer.style.display,
          computedDisplay: window.getComputedStyle(dashboardContainer).display
        });
        setMessage("");
      }

      function showLogin() {
        console.log("showLogin called");
        dashboardContainer.style.display = "none";
        loginContainer.style.display = "flex";
        loginContainer.style.flexDirection = "column";
        setMessage("");
      }

      const storedUsername = localStorage.getItem("username");
      if (storedUsername) {
        showDashboard(storedUsername);
      }
    });
  </script>
</body>
</html>
